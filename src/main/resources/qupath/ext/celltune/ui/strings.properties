# Parameters
param.num_rounds.label  = Rounds:
param.num_rounds.help   = Number of boosting rounds\n\n\
    More rounds = more accurate but slower training.\n\
    150-300 is a good range for most datasets.
param.max_depth.label   = Max depth:
param.max_depth.help    = Maximum tree depth\n\n\
    Controls model complexity. 5-8 is typical.\n\
    Higher values risk overfitting on small label sets.

